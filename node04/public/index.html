<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cars App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Cars App</h1>

  <h2>Add / Update a Car</h2>

  <form id="carForm">
    <input type="text" id="brand" placeholder="Brand" required>
    <input type="text" id="make" placeholder="Make" required>
    <input type="number" id="year" placeholder="Year" required>
    <input type="text" id="color" placeholder="Color" required>
    <button type="submit" id="submitBtn">Add Car</button>
  </form>

  <h2>Cars</h2>
  <table>
    <thead>
      <tr>
        <th>Brand</th>
        <th>Year</th>
        <th>Make</th>
        <th>Color</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="carsTableBody"></tbody>
  </table>

  <script>
    const form = document.getElementById("carForm");
    const tableBody = document.getElementById("carsTableBody");
    const submitBtn = document.getElementById("submitBtn");
    
    // We'll use this variable to track if we are currently updating a car
    let editingCarId = null;

    // Load and display cars
    async function loadCars() {
      const response = await fetch("/api/cars");
      const cars = await response.json();

      tableBody.innerHTML = "";

      cars.forEach(car => {
        const row = document.createElement("tr");

        // Reordered the data to match the new headers and added action buttons
        row.innerHTML = `
          <td>${car.brand}</td>
          <td>${car.year}</td>
          <td>${car.make}</td>
          <td>${car.color}</td>
          <td>
            <button onclick="deleteCar(${car.id})">[delete]</button>
            <button onclick="setupUpdate(${car.id})">[update]</button>
          </td>
        `;

        tableBody.appendChild(row);
      });
    }

    // DELETE logic
    async function deleteCar(id) {
      await fetch(`/api/cars/${id}`, {
        method: "DELETE"
      });
      // Refresh the table after deleting
      loadCars();
    }

    // UPDATE setup logic: fetches the specific car and populates the form
    async function setupUpdate(id) {
      const response = await fetch(`/api/cars/${id}`);
      const car = await response.json();

      // Populate form fields
      document.getElementById("brand").value = car.brand;
      document.getElementById("make").value = car.make;
      document.getElementById("year").value = car.year;
      document.getElementById("color").value = car.color;

      // Set state to editing mode
      editingCarId = id;
      submitBtn.textContent = "Update Car";
    }

    // Handle form submission for BOTH Adding and Updating
    form.addEventListener("submit", async event => {
      event.preventDefault();

      const carData = {
        brand: document.getElementById("brand").value,
        make: document.getElementById("make").value,
        year: document.getElementById("year").value,
        color: document.getElementById("color").value
      };

      if (editingCarId) {
        // We are in UPDATE mode -> Send PUT request
        await fetch(`/api/cars/${editingCarId}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(carData)
        });
        
        // Reset state back to Add mode
        editingCarId = null;
        submitBtn.textContent = "Add Car";
      } else {
        // We are in ADD mode -> Send POST request
        await fetch("/api/cars", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(carData)
        });
      }

      form.reset();
      loadCars();
    });

    // Initial load
    loadCars();
  </script>
</body>
</html>
